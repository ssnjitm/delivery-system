version: '3.8'

services:
  api:
    build:
      context: .
      target: runner
    container_name: delivery_api
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - MONGO_URI=mongodb://root:secret_db_pass@mongodb:27017/delivery_platform?authSource=admin
      - REDIS_URL=redis://redis:6373
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - MAPS_API_KEY=${MAPS_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - delivery_network

  mongodb:
    image: mongo:6.0
    container_name: delivery_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret_db_pass
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand({ping:1})' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - delivery_network

  redis:
    image: redis:7.2-alpine
    container_name: delivery_redis
    ports:
      - "6373:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - delivery_network

networks:
  delivery_network:
    driver: bridge

volumes:
  mongo_data:
  redis_data: